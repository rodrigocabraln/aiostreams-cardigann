---
# AIOStreams as a native Prowlarr (Cardigann) Torznab indexer — no extra service.
# Hits your AIOStreams /stream/...json endpoint, parses streams[], emits Torznab.
#
# Design notes (why this is robust):
#   - User-Agent "AIOStreams/..." makes AIOStreams attach structured streamData.
#   - infohash is coalesced from 3 sources (streamData.torrent.infoHash ->
#     top-level infoHash -> regex over url) so 100% of torrents are captured.
#     The \b...\b in the regex is REQUIRED: some debrid urls embed a url-encoded
#     magnet where "%3A" puts stray hex right before the hash.
#   - magnet is auto-built by Prowlarr from the infohash field (needs type: public).
#   - A `category` field is REQUIRED: Cardigann does NOT apply a path's
#     `categories:` to rows (those only pick which path runs). Without it every
#     release is uncategorized and Sonarr/Radarr return "no results in categories".
#
# SETUP:
#   1. Edit `links` to your AIOStreams host (scheme + host + port only).
#   2. Put this file in Prowlarr's  Definitions/Custom/  folder and restart Prowlarr.
#   3. Add indexer "AIOStreams" and fill UUID + Base64 config from your manifest URL
#      (http://host:3000/stremio/<uuid>/<b64config>/manifest.json). The b64config
#      must be URL-safe (no "/"); AIOStreams blobs are.
#   4. Tip: point AIOStreams at a torrent/debrid-only config (no WebStreamr /
#      streaming addons). Do cached-only / dedup / sorting inside AIOStreams itself.
id: aiostreams
name: AIOStreams
description: "AIOStreams (Stremio addon) exposed as a Torznab indexer"
language: en-US
type: public            # REQUIRED so Prowlarr auto-generates magnets from infohash
encoding: UTF-8
followredirect: false
testlinktorrent: false
requestDelay: 3
links:
  - http://10.1.1.51:3000        # <-- change to your AIOStreams host (host only)

caps:
  categories:
    Movies: Movies
    TV: TV
  modes:
    search: [q]
    movie-search: [q, imdbid]
    tv-search: [q, imdbid, season, ep]
  allowrawsearch: false

settings:
  - name: info
    type: info
    label: Configuration
    default: "From your AIOStreams manifest URL (http://host:3000/stremio/&lt;uuid&gt;/&lt;b64config&gt;/manifest.json) copy the UUID and the Base64 config string into the fields below."
  - name: uuid
    type: text
    label: UUID
    default: ""
  - name: b64config
    type: text
    label: Base64 Encoded Configuration
    default: ""
  - name: default_seeders
    type: text
    label: "Fallback seeders for debrid items that report none (helps *arr accept them)"
    default: "999"
  - name: validate_imdb_movie
    type: text
    label: "IMDB id of a movie that returns results (Radarr connection test)"
    default: "tt0133093"   # The Matrix
  - name: validate_imdb_tv
    type: text
    label: "IMDB id of a series that returns results (Sonarr connection test)"
    default: "tt0944947"   # Game of Thrones

search:
  headers:
    User-Agent: ["AIOStreams/cardigann"]   # triggers AIOStreams provideStreamData
  paths:
    - path: "/stremio/{{ .Config.uuid }}/{{ .Config.b64config }}/stream/movie/{{ if .Query.IMDBID }}{{ .Query.IMDBID }}{{ else }}{{ .Config.validate_imdb_movie }}{{ end }}.json"
      method: get
      response:
        type: json
        noResultsMessage: '"streams":[]'
      categories: [Movies]
    - path: "/stremio/{{ .Config.uuid }}/{{ .Config.b64config }}/stream/series/{{ if .Query.IMDBID }}{{ .Query.IMDBID }}{{ else }}{{ .Config.validate_imdb_tv }}{{ end }}:{{ if .Query.Season }}{{ .Query.Season }}{{ else }}1{{ end }}:{{ if .Query.Ep }}{{ .Query.Ep }}{{ else }}1{{ end }}.json"
      method: get
      response:
        type: json
        noResultsMessage: '"streams":[]'
      categories: [TV]

  rows:
    selector: streams
    missingAttributeEqualsNoResults: true

  fields:
    # EVERY selector is `optional` so AIOStreams' info/statistic rows (which have
    # no streamData/filename) don't abort parsing. Cardigann's template engine only
    # does single-level if/else; multi-source fallbacks use the `or` function.

    # --- title: the release filename (with extension). Simple selector + trim. ---
    title:
      selector: behaviorHints.filename
      optional: true
      default: "Unknown Title"
      filters:
        - name: trim

    # --- size: simple, always present, non-streamData. ---
    size:
      selector: behaviorHints.videoSize
      optional: true

    # --- infohash: this is what turns a stream into a usable torrent, so cover the
    #     most sources for MAX torrents: streamData hash -> top-level -> hash in url. ---
    _hash_nested:
      selector: streamData.torrent.infoHash
      optional: true
      default: ""
    _hash_top:
      selector: infoHash
      optional: true
      default: ""
    _url:
      selector: url
      optional: true
      default: ""
    infohash:
      text: "{{ or (.Result._hash_nested) (.Result._hash_top) (.Result._url) }}"
      filters:
        # \b is REQUIRED: some debrid urls embed a url-encoded magnet where "%3A"
        # puts stray hex right before the hash; without it the window slices wrong.
        - name: regexp
          args: "\\b([a-fA-F0-9]{40})\\b"

    # --- seeders: real count if AIOStreams reports it, else the configured
    #     fallback (debrid items often have none; *arr needs a value to accept). ---
    _seeders:
      selector: streamData.torrent.seeders
      optional: true
      default: ""
    seeders:
      text: "{{ or (.Result._seeders) (.Config.default_seeders) }}"
    leechers:
      text: "0"

    # --- category: TV if AIOStreams parsed a season/episode (when streamData is
    #     present), else a season/episode marker in the title; otherwise Movies. ---
    _seasons:
      selector: streamData.parsedFile.seasons
      optional: true
      default: ""
    _episodes:
      selector: streamData.parsedFile.episodes
      optional: true
      default: ""
    _is_tv:
      text: "{{ .Result.title }}"
      filters:
        - name: regexp
          args: "\\b(S\\d{1,3}(E\\d{1,4})?|Season[ ._]?\\d+|\\d{1,2}x\\d{1,3})\\b"
    category:
      text: "{{ if or (.Result._seasons) (.Result._episodes) (.Result._is_tv) }}TV{{ else }}Movies{{ end }}"

    # Fixed valid publish date so every item has a parseable date (AIOStreams
    # streams carry no upload date).
    date:
      text: "Apr. 18th '11"
      filters:
        - name: re_replace
          args: ["st|nd|rd|th", ""]
        - name: replace
          args: ["'", ""]
        - name: dateparse
          args: "MMM. d yy"

    # No download/magnet field is needed: Prowlarr auto-builds the magnet from the
    # infohash field (this is why `type: public` is required).
